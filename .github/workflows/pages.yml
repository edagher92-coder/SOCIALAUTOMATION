name: Deploy GitHub Pages (AdPilot OS demo)

on:
  push:
    branches: ["main"]
    paths: ["docs/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Engine parity test (browser engine == Python engine)
        run: node docs/engine.test.js
      - uses: actions/configure-pages@v5
        with:
          enablement: true   # auto-enable GitHub Pages on first run (no manual toggle)
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build-test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
