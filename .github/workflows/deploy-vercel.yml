name: Deploy adpilot-v2 to Vercel

# Auto-deploys the V2 app on merge to main. Safe by default: if VERCEL_TOKEN
# isn't set, it no-ops with setup instructions (never fails the run).
on:
  push:
    branches: ["main"]
    paths: ["adpilot-v2/**", ".github/workflows/deploy-vercel.yml"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Deploy (if configured)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::notice::VERCEL_TOKEN not set — skipping deploy."
            echo "To enable: vercel link the project, then add repo secrets VERCEL_TOKEN (+ VERCEL_ORG_ID, VERCEL_PROJECT_ID)."
            exit 0
          fi
          npm i -g vercel@latest
          cd adpilot-v2
          vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          vercel build --prod --token "$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
